# # Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, G, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
#
# unbind = SUPER, F # Full screen
bindd = SUPER, F, File manager, exec, uwsm-app -- nautilus --new-window
#
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER ALT, B, Browser (private), exec, omarchy-launch-browser --private

# Notifications
unbind = SUPER, COMMA
unbind = SUPER SHIFT, COMMA
unbind = SUPER CTRL, COMMA
unbind = SUPER ALT, COMMA
unbind = SUPER SHIFT ALT, COMMA
bindd = SUPER, D, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, D, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, D, Toggle silencing notifications, exec, omarchy-toggle-notification-silencing
bindd = SUPER ALT, D, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, D, Restore last notification, exec, makoctl restore

# Keybinding menu
unbind = SUPER, K
bindd = SUPER, Q, Show key bindings, exec, omarchy-menu-keybindings

# Navigation
bindd = SUPER, h, Focus on left window, movefocus, l
bindd = SUPER, l, Focus on right window, movefocus, r
bindd = SUPER, k, Focus on above window, movefocus, u
bindd = SUPER, j, Focus on below window, movefocus, d

# Swap windows
bind = SUPER ALT, h, swapwindow, l
bind = SUPER ALT, l, swapwindow, r
bind = SUPER ALT, k, swapwindow, u
bind = SUPER ALT, j, swapwindow, d

# Navigate workspaces
bindd = SUPER, U, Switch to workspace 1, workspace, 1
bindd = SUPER, I, Switch to workspace 2, workspace, 2
bindd = SUPER, O, Switch to workspace 3, workspace, 3
bindd = SUPER, P, Switch to workspace 4, workspace, 4
bindd = SUPER, bracketleft, Switch to workspace 5, workspace, 5

# Move window to workspaces
bindd = SUPER ALT, U, Move window to workspace 1, movetoworkspace, 1
bindd = SUPER ALT, I, Move window to workspace 2, movetoworkspace, 2
bindd = SUPER ALT, O, Move window to workspace 3, movetoworkspace, 3
bindd = SUPER ALT, P, Move window to workspace 4, movetoworkspace, 4
bindd = SUPER ALT, bracketleft, Move window to workspace 5, movetoworkspace, 5

# Close windows
bindd = SUPER, W, Close window, killactive,
bindd = CTRL ALT, DELETE, Close all windows, exec, omarchy-hyprland-window-close-all

# Control tiling
bindd = SUPER, COMMA, Toggle window split, layoutmsg, togglesplit
bindd = SUPER, R, Pseudo window, pseudo, # dwindle
bindd = SUPER ALT, PERIOD, Toggle window floating/tiling, togglefloating,
bindd = SUPER, PERIOD, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER, E, Full screen, fullscreen, 0
bindd = SUPER CTRL, E, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, E, Full width, fullscreen, 1
bindd = SUPER ALT, R, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# Control scratchpad
bindd = SUPER, S, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Resize active window
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, code:20, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, code:21, Expand window down, resizeactive, 0 100

# Move/resize windows with mainMod + LMB/RMB and dragging
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

bindd = SUPER, code:61, Cycle monitor scaling, exec, omarchy-hyprland-monitor-scaling-cycle
bindd = SUPER ALT, code:61, Cycle monitor scaling backwards, exec, omarchy-hyprland-monitor-scaling-cycle --reverse
